<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes — Oversimplified Sessions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#12151a; --card:#1b2028; --ink:#e9e7df; --muted:#8b93a1; --faint:#565f6e;
    --brass:#c9a86b; --brass-dim:#8a7550; --line:rgba(233,231,223,0.08); --line-strong:rgba(233,231,223,0.16);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'JetBrains Mono',sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:64px 24px 120px;}
  a{color:inherit;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.14em;color:var(--brass);text-transform:uppercase;margin-bottom:14px;}
  h1{font-family:'JetBrains Mono',serif;font-weight:600;font-size:clamp(34px,6vw,52px);line-height:1.05;margin:0 0 14px;letter-spacing:-0.01em;}
  nav{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.1em;margin-top:24px;}
  nav a{margin-right:20px;color:var(--muted);text-decoration:none;}
  nav a.active{color:var(--brass);}

  .divider {
    border-top: 1px solid var(--line);
    margin: 48px 0;
  }

  .note-entry{
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 18px;
    align-items: start;
    padding: 28px 0;
    border-bottom: 1px solid var(--line);
  }
  .note-entry:last-child { border-bottom: none; }

  .num{font-family:'JetBrains Mono',monospace;color:var(--faint);font-size:13px;padding-top:3px;}
  .note-body h3{font-family:'JetBrains Mono',serif;font-weight:600;font-size:21px;margin:0 0 6px;}
  .note-desc{color:var(--muted);margin-bottom:12px;}
  .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);text-align:right;white-space:nowrap;padding-top:4px;}
  .toggle-btn{font-size:18px;color:var(--brass);cursor:pointer;}
  .note-content{display:none;padding-top:16px;line-height:1.75;white-space:pre-wrap;font-size:15.2px;color:var(--ink);}
  .note-content.open{display:block;}

  .empty{text-align:center;padding:80px 20px;color:var(--faint);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Archive</div>
    <h1>Notes</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="aboutus.html">About Us</a>
      <a href="notes.html" class="active">Notes</a>
    </nav>
  </header>

  <div class="divider"></div>

  <div id="notes-list"></div>
  <div class="empty" id="empty" style="display:none;">
    <p>No notes published yet.</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBqY1FRLKIju8-DS04DQBiT9HBL0pkVbiY",
    authDomain: "lecturesbydocd.firebaseapp.com",
    projectId: "lecturesbydocd",
    storageBucket: "lecturesbydocd.firebasestorage.app",
    messagingSenderId: "259922970808",
    appId: "1:259922970808:web:ff73c6a6f8cc813fd78c4d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function formatDate(ts) {
    const d = ts?.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  const listEl = document.getElementById('notes-list');
  const emptyEl = document.getElementById('empty');

  const q = query(collection(db, "notes"), orderBy("date", "desc"));
  onSnapshot(q, (snap) => {
    if (snap.empty) {
      listEl.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }

    emptyEl.style.display = 'none';

    const docs = snap.docs.map(d => d.data());
    docs.sort((a, b) => (b.order ?? 0) - (a.order ?? 0));

    listEl.innerHTML = docs.map((n, i) => {
      const numStr = String(docs.length - i).padStart(2, '0');
      return `
        <div class="note-entry">
          <div class="num">${numStr}</div>
          <div class="note-body">
            <h3>${escapeHtml(n.title)}</h3>
            ${n.description ? `<div class="note-desc">${escapeHtml(n.description)}</div>` : ''}
            <div class="note-content">${escapeHtml(n.content || 'No content')}</div>
          </div>
          <div style="text-align:right;">
            <div class="meta">${formatDate(n.date)}</div>
            <span class="toggle-btn">▼</span>
          </div>
        </div>
      `;
    }).join('');

    // Dropdown functionality
    document.querySelectorAll('.note-entry').forEach(entry => {
      const content = entry.querySelector('.note-content');
      const btn = entry.querySelector('.toggle-btn');

      entry.style.cursor = 'pointer';
      entry.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;

        const isOpen = content.classList.contains('open');

        document.querySelectorAll('.note-content').forEach(c => c.classList.remove('open'));
        document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = '▼');

        if (!isOpen) {
          content.classList.add('open');
          btn.textContent = '▲';
        }
      });
    });
  });
</script>
</body>
</html>
