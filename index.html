<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Session Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --bg:#12151a; --card:#1b2028; --ink:#e9e7df; --muted:#8b93a1; --faint:#565f6e;
    --brass:#c9a86b; --brass-dim:#8a7550; --line:rgba(233,231,223,0.08); --line-strong:rgba(233,231,223,0.16);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:64px 24px 120px;}
  a{color:inherit;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.14em;color:var(--brass);text-transform:uppercase;margin-bottom:14px;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(34px,6vw,52px);line-height:1.05;margin:0 0 14px;letter-spacing:-0.01em;}
  header{margin-bottom:56px;}
  header p{color:var(--muted);font-size:15px;line-height:1.6;max-width:46ch;margin:0;}
  .footlink{display:inline-block;margin-top:56px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);text-decoration:none;border-bottom:1px solid transparent;}
  .footlink:hover{color:var(--brass);border-color:var(--brass-dim);}
  .log{border-top:1px solid var(--line);}
  .entry{display:grid;grid-template-columns:56px 1fr auto;gap:18px;align-items:start;padding:22px 0;border-bottom:1px solid var(--line);}
  .num{font-family:'JetBrains Mono',monospace;color:var(--faint);font-size:13px;padding-top:3px;}
  .entry .body h3{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0 0 4px;}
  .entry .body a.link{color:var(--brass);text-decoration:none;font-size:14px;border-bottom:1px solid var(--brass-dim);}
  .entry .body a.link:hover{color:#d8b87e;}
  .entry .body .note{color:var(--muted);font-size:13.5px;margin-top:6px;line-height:1.5;}
  .embed-wrap{position:relative;width:100%;padding-top:56.25%;margin-top:10px;border-radius:8px;overflow:hidden;background:#0b0d10;border:1px solid var(--line);}
  .embed-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
  .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);text-align:right;white-space:nowrap;padding-top:4px;}
  .empty{text-align:center;padding:80px 20px;color:var(--faint);}
  .empty .glyph{font-size:28px;margin-bottom:14px;opacity:.5;}
  .empty p{font-size:14px;max-width:34ch;margin:0 auto;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Archive — updated continuously</div>
    <h1>The Session Log</h1>
    <p>Every lecture, in order, as it happens. Click through to watch — nothing to download, nothing to lose.</p>
  </header>

  <div class="log" id="log"></div>
  <div class="empty" id="empty" style="display:none;">
    <div class="glyph">&#9679;</div>
    <p>No sessions logged yet. Once the first lecture is added, it'll appear here.</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ---- PASTE YOUR FIREBASE CONFIG HERE (same object in admin.html) ----
  const firebaseConfig = {
    apiKey: "AIzaSyBqY1FRLKIju8-DS04DQBiT9HBL0pkVbiY",
    authDomain: "lecturesbydocd.firebaseapp.com",
    projectId: "lecturesbydocd",
    storageBucket: "lecturesbydocd.firebasestorage.app",
    messagingSenderId: "259922970808",
    appId: "1:259922970808:web:ff73c6a6f8cc813fd78c4d"
  };
  // -----------------------------------------------------------------

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function getEmbedUrl(link) {
    let m = link.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
    if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
    m = link.match(/drive\.google\.com\/open\?id=([^&]+)/);
    if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
    m = link.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=|youtube\.com\/embed\/)([A-Za-z0-9_-]{6,})/);
    if (m) return `https://www.youtube.com/embed/${m[1]}`;
    m = link.match(/vimeo\.com\/(\d+)/);
    if (m) return `https://player.vimeo.com/video/${m[1]}`;
    return null;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(ts) {
    const d = ts?.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  const logEl = document.getElementById('log');
  const emptyEl = document.getElementById('empty');

  const q = query(collection(db, "lectures"), orderBy("date", "desc"));
  onSnapshot(q, (snap) => {
    if (snap.empty) { logEl.innerHTML = ''; emptyEl.style.display = 'block'; return; }
    emptyEl.style.display = 'none';
    const docs = snap.docs.map(d => d.data());
    logEl.innerHTML = docs.map((l, i) => {
      const numStr = String(docs.length - i).padStart(2, '0');
      const embedUrl = getEmbedUrl(l.link);
      const media = embedUrl
        ? `<div class="embed-wrap"><iframe src="${escapeHtml(embedUrl)}" allow="autoplay; fullscreen" allowfullscreen></iframe></div>`
        : `<a class="link" href="${escapeHtml(l.link)}" target="_blank" rel="noopener">Watch session &rarr;</a>`;
      return `
        <div class="entry">
          <div class="num">${numStr}</div>
          <div class="body">
            <h3>${escapeHtml(l.title)}</h3>
            ${media}
            ${l.note ? `<div class="note">${escapeHtml(l.note)}</div>` : ''}
          </div>
          <div class="meta">${formatDate(l.date)}</div>
        </div>
      `;
    }).join('');
  }, (err) => {
    logEl.innerHTML = `<div style="color:#c96b6b;padding:40px 0;font-family:'JetBrains Mono',monospace;font-size:13px;">Couldn't load sessions — check the Firebase config at the top of this file's script tag.</div>`;
    console.error(err);
  });
</script>
</body>
</html>
