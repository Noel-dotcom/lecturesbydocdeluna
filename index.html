<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oversimplified Sessions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --bg:#12151a; --card:#1b2028; --ink:#e9e7df; --muted:#8b93a1; --faint:#565f6e;
    --brass:#c9a86b; --brass-dim:#8a7550; --line:rgba(233,231,223,0.08); --line-strong:rgba(233,231,223,0.16);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:64px 24px 120px;}
  a{color:inherit;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.14em;color:var(--brass);text-transform:uppercase;margin-bottom:14px;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(34px,6vw,52px);line-height:1.05;margin:0 0 14px;letter-spacing:-0.01em;}
  header{margin-bottom:56px;}
  header p{color:var(--muted);font-size:15px;line-height:1.6;max-width:46ch;margin:0;}
  .footlink{display:inline-block;margin-top:56px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);text-decoration:none;border-bottom:1px solid transparent;}
  .footlink:hover{color:var(--brass);border-color:var(--brass-dim);}
  .log{border-top:1px solid var(--line);}
  .entry{display:grid;grid-template-columns:56px 1fr auto;gap:18px;align-items:start;padding:22px 0;border-bottom:1px solid var(--line);}
  .num{font-family:'JetBrains Mono',monospace;color:var(--faint);font-size:13px;padding-top:3px;}
  .entry .body h3{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0 0 4px;}
  .entry .body a.link{color:var(--brass);text-decoration:none;font-size:14px;border-bottom:1px solid var(--brass-dim);}
  .entry .body a.link:hover{color:#d8b87e;}
  .entry .body .note{color:var(--muted);font-size:13.5px;margin-top:6px;line-height:1.5;}
  .embed-wrap{position:relative;width:100%;aspect-ratio:16/9;margin-top:10px;border-radius:8px;overflow:hidden;background:#0b0d10;border:1px solid var(--line);}
  .embed-wrap iframe{display:block;width:100%;height:100%;border:0;}
  .lightbox{
    position:fixed;inset:0;background:rgba(5,6,8,0.92);
    display:none;align-items:center;justify-content:center;
    z-index:100;padding:20px;
  }
  .lightbox.open{display:flex;}
  .lightbox-inner{width:100%;max-width:900px;}
  .lightbox-frame{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden;}
  .lightbox-frame iframe{width:100%;height:100%;border:0;display:block;}
  .lightbox-close{
    display:block;margin:0 0 12px auto;
    background:none;border:1px solid var(--line-strong);color:var(--muted);
    padding:8px 16px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;
  }
  .lightbox-close:hover{color:var(--ink);border-color:var(--ink);}
  .play-placeholder{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:linear-gradient(160deg, #1c222b, #0e1116);
    cursor:pointer;border:0;padding:0;
  }
  .play-placeholder .ring{
    width:56px;height:56px;border-radius:50%;
    background:rgba(201,168,107,0.12);border:1px solid var(--brass-dim);
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease, background .15s ease;
  }
  .play-placeholder:hover .ring{background:rgba(201,168,107,0.22);transform:scale(1.06);}
  .play-placeholder .ring svg{margin-left:3px;}
  .play-placeholder span{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase;}
  .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);text-align:right;white-space:nowrap;padding-top:4px;}
  .empty{text-align:center;padding:80px 20px;color:var(--faint);}
  .empty .glyph{font-size:28px;margin-bottom:14px;opacity:.5;}
  .empty p{font-size:14px;max-width:34ch;margin:0 auto;line-height:1.6;}

  /* chat widget */
  #chat-fab{
    position:fixed;bottom:22px;right:22px;z-index:90;
    width:54px;height:54px;border-radius:50%;
    background:var(--brass);color:#191510;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    font-size:22px;
  }
  #chat-fab:hover{background:#d8b87e;}
  #chat-panel{
    position:fixed;bottom:88px;right:22px;z-index:90;
    width:min(340px, calc(100vw - 44px));
    max-height:min(480px, calc(100vh - 140px));
    background:var(--card);border:1px solid var(--line-strong);
    border-radius:14px;display:none;flex-direction:column;overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,0.5);
  }
  #chat-panel.open{display:flex;}
  #chat-head{
    padding:14px 16px;border-bottom:1px solid var(--line);
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--brass);display:flex;justify-content:space-between;align-items:center;
  }
  #chat-close{background:none;border:0;color:var(--faint);font-size:16px;cursor:pointer;}
  #chat-close:hover{color:var(--ink);}
  #chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
  .chat-msg{font-size:13.5px;line-height:1.5;padding:9px 12px;border-radius:10px;max-width:88%;}
  .chat-msg.user{align-self:flex-end;background:var(--brass);color:#191510;}
  .chat-msg.bot{align-self:flex-start;background:#232a34;color:var(--ink);}
  .chat-msg.bot.loading{color:var(--faint);font-style:italic;}
  #chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line);}
  #chat-input{
    flex:1;background:#101318;border:1px solid var(--line-strong);color:var(--ink);
    padding:9px 11px;border-radius:8px;font-size:13.5px;font-family:'Inter',sans-serif;
  }
  #chat-input:focus{outline:none;border-color:var(--brass-dim);}
  #chat-send{
    background:var(--brass);color:#191510;border:none;border-radius:8px;
    padding:0 14px;font-weight:600;cursor:pointer;font-size:13px;
  }
  #chat-send:hover{background:#d8b87e;}
  #chat-send:disabled{opacity:0.5;cursor:not-allowed;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Archive — updated continuously</div>
    <h1>Oversimplified Sessions</h1>
    <p>All my oversimplified lectures, in one place.</p>
  </header>

  <div class="log" id="log"></div>
  <div class="empty" id="empty" style="display:none;">
    <div class="glyph">&#9679;</div>
    <p>No sessions logged yet. Once the first lecture is added, it'll appear here.</p>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lightbox-close">Close ✕</button>
    <div class="lightbox-frame" id="lightbox-frame"></div>
  </div>
</div>

<button id="chat-fab" aria-label="Open chat helper">&#128172;</button>
<div id="chat-panel">
  <div id="chat-head">
    <span>Ask a question</span>
    <button id="chat-close">Close ✕</button>
  </div>
  <div id="chat-messages">
    <div class="chat-msg bot">Hi! Ask me anything about this site or the lecture material.</div>
  </div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Type a question...">
    <button id="chat-send">Send</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ---- PASTE YOUR FIREBASE CONFIG HERE (same object in admin.html) ----
  const firebaseConfig = {
    apiKey: "AIzaSyBqY1FRLKIju8-DS04DQBiT9HBL0pkVbiY",
    authDomain: "lecturesbydocd.firebaseapp.com",
    projectId: "lecturesbydocd",
    storageBucket: "lecturesbydocd.firebasestorage.app",
    messagingSenderId: "259922970808",
    appId: "1:259922970808:web:ff73c6a6f8cc813fd78c4d"
  };
  // -----------------------------------------------------------------

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const lightbox = document.getElementById('lightbox');
const lightboxFrame = document.getElementById('lightbox-frame');
function openLightbox(url) {
  lightboxFrame.innerHTML = `<iframe id="active-embed" src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  lightbox.classList.add('open');
  try {
    if (lightbox.requestFullscreen) lightbox.requestFullscreen().catch(() => {});
    else if (lightbox.webkitRequestFullscreen) lightbox.webkitRequestFullscreen();
  } catch (e) { /* fullscreen not available, modal still works fine */ }
}
function closeLightbox() {
  lightbox.classList.remove('open');
  lightboxFrame.innerHTML = ''; // stop playback
}
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && lightbox.classList.contains('open')) closeLightbox();
});

function getEmbedUrl(link) {
    let m = link.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
    if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
    m = link.match(/drive\.google\.com\/open\?id=([^&]+)/);
    if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
    m = link.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=|youtube\.com\/embed\/)([A-Za-z0-9_-]{6,})/);
    if (m) return `https://www.youtube.com/embed/${m[1]}`;
    m = link.match(/vimeo\.com\/(\d+)/);
    if (m) return `https://player.vimeo.com/video/${m[1]}`;
    return null;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(ts) {
    const d = ts?.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  const logEl = document.getElementById('log');
  const emptyEl = document.getElementById('empty');

  const q = query(collection(db, "lectures"), orderBy("date", "desc"));
  onSnapshot(q, (snap) => {
    if (snap.empty) { logEl.innerHTML = ''; emptyEl.style.display = 'block'; return; }
    emptyEl.style.display = 'none';
    const docs = snap.docs.map(d => d.data());
    docs.sort((a, b) => {
      const oa = a.order, ob = b.order;
      if (oa != null && ob != null) return ob - oa;
      return 0;
    });
    logEl.innerHTML = docs.map((l, i) => {
      const numStr = String(docs.length - i).padStart(2, '0');
      const embedUrl = getEmbedUrl(l.link);
      const media = embedUrl
        ? `<div class="embed-wrap" data-embed-url="${escapeHtml(embedUrl)}">
             <button class="play-placeholder" aria-label="Play ${escapeHtml(l.title)}">
               <div class="ring">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="#c9a86b"><path d="M8 5v14l11-7z"/></svg>
               </div>
               <span>Play session</span>
             </button>
           </div>`
        : `<a class="link" href="${escapeHtml(l.link)}" target="_blank" rel="noopener">Watch session &rarr;</a>`;
      return `
        <div class="entry">
          <div class="num">${numStr}</div>
          <div class="body">
            <h3>${escapeHtml(l.title)}</h3>
            ${media}
            ${l.note ? `<div class="note">${escapeHtml(l.note)}</div>` : ''}
          </div>
          <div class="meta">${formatDate(l.date)}</div>
        </div>
      `;
    }).join('');

    logEl.querySelectorAll('.play-placeholder').forEach(btn => {
      btn.addEventListener('click', () => {
        const wrap = btn.closest('.embed-wrap');
        const url = wrap.dataset.embedUrl;
        openLightbox(url);
      });
    });
  }, (err) => {
    logEl.innerHTML = `<div style="color:#c96b6b;padding:40px 0;font-family:'JetBrains Mono',monospace;font-size:13px;">Couldn't load sessions — check the Firebase config at the top of this file's script tag.</div>`;
    console.error(err);
  });

  // ---- Chat widget ----
  // Paste the URL your Cloudflare Worker gives you after deploying (e.g. https://your-worker.your-subdomain.workers.dev)
  const WORKER_URL = "https://gen-chemlectures.c15-1004-131.workers.dev/";

  const chatFab = document.getElementById('chat-fab');
  const chatPanel = document.getElementById('chat-panel');
  const chatClose = document.getElementById('chat-close');
  const chatMessages = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');
  const chatSend = document.getElementById('chat-send');

  chatFab.addEventListener('click', () => chatPanel.classList.add('open'));
  chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

  function addMessage(text, who) {
    const div = document.createElement('div');
    div.className = `chat-msg ${who}`;
    div.textContent = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div;
  }

  async function sendQuestion() {
    const question = chatInput.value.trim();
    if (!question) return;
    addMessage(question, 'user');
    chatInput.value = '';
    chatSend.disabled = true;
    const loadingEl = addMessage('Thinking...', 'bot loading');

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      loadingEl.remove();
      if (data.error) {
        addMessage(data.error, 'bot');
      } else {
        addMessage(data.answer, 'bot');
      }
    } catch (e) {
      loadingEl.remove();
      addMessage("Couldn't reach the chat helper — check your connection and try again.", 'bot');
    }
    chatSend.disabled = false;
  }

  chatSend.addEventListener('click', sendQuestion);
  chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendQuestion(); });
</script>
</body>
</html>
